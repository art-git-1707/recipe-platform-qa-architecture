name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Playwright E2E Tests (Gatekeeper) & Qase Reporting
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirement-test.txt

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run Pytest and Report to Qase
        env:
          SECRET_KEY: 'ci-cd-dummy-secret-key-for-automated-testing-only'
          QASE_MODE: testops
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_TESTOPS_PROJECT: RWA
        run: |
          pytest tests/

  deploy:
    name: Pull Code & Restart Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute SSH Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Start auto Deploy..."
            cd ~/Recipe_WebApp
            
            echo "Pull latest code from GitHub..."
            git pull origin main
            
            echo "Rebuild and Restart Docker Container..."
            docker compose up -d --build
            
            echo "Deploy success!"
